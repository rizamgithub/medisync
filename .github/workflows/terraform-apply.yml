name: Terraform Apply

# Runs when infra/ changes land on main. Gated behind the 'production'
# GitHub Environment — the job pauses until a required reviewer approves.

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch: {}

# Never let two applies overlap (the blob-lease lock would block one anyway).
concurrency:
  group: terraform-apply
  cancel-in-progress: false

permissions:
  id-token: write   # mint the OIDC token used to authenticate to Azure
  contents: read    # checkout

jobs:
  apply:
    name: terraform apply
    runs-on: ubuntu-latest
    # The environment reference is what triggers the manual-approval gate.
    # It also makes the OIDC token's subject 'repo:.../environment:production',
    # which is why medisync-deploy needs the github-env-production credential.
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: terraform init -input=false

      - name: terraform apply
        run: terraform apply -auto-approve -input=false
