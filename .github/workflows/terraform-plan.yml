name: Terraform Plan

# Runs on every pull request that touches infra/. Produces a plan and posts it
# back to the PR as a comment. Never applies anything.

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-plan.yml'

# A newer push to the same PR cancels the in-flight plan.
concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write       # mint the OIDC token used to authenticate to Azure
  contents: read        # checkout
  pull-requests: write  # post the plan as a PR comment

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      # Terraform's azurerm provider + backend authenticate via GitHub OIDC.
      # No client secret — these are non-sensitive identifiers (set in runbook 04).
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: terraform init
        id: init
        run: terraform init -input=false
        continue-on-error: true

      - name: terraform validate
        id: validate
        run: terraform validate -no-color
        continue-on-error: true

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const raw = (process.env.PLAN_STDOUT || 'No plan output — an earlier step failed.').trim();
            const plan = raw.length > 60000 ? raw.slice(0, 60000) + '\n... (truncated)' : raw;
            const body = [
              '## Terraform Plan — `${{ steps.plan.outcome }}`',
              '',
              'fmt `${{ steps.fmt.outcome }}` · init `${{ steps.init.outcome }}` · validate `${{ steps.validate.outcome }}`',
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if any step failed
        if: >-
          steps.fmt.outcome == 'failure' ||
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1
